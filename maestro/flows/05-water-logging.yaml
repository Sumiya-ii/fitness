---
# Flow 05: Log water intake and verify the count updates
# On the Home screen carousel page 1 there is a Water widget with:
#   - testID="water-remove-btn"  — minus button (remove cup)
#   - testID="water-add-btn"     — plus button (add cup)
#   - testID="water-count"       — numeric cup count display
# Each tap adds/removes 237 ml (CUP_ML constant).
# The displayed value is waterCupsConsumed.toFixed(1) cups + a ml label.
#
# This flow swipes to page 1, taps Add twice, then asserts the water
# section is still visible and no error appeared.
#
# Prerequisites: user is authenticated and has completed onboarding.

appId: com.coach.mobile

---
- launchApp

# Wait for the main tab bar to appear
- extendedWaitUntil:
    visible: "Home"
    timeout: 12000

# Ensure we are on the Home tab
- tapOn: "Home"
- waitForAnimationToEnd

# ── Swipe to carousel page 1 (Health Score + Water) ───────────────────
# The nutrition carousel is a horizontal ScrollView with pagingEnabled.
# One left swipe from page 0 lands on page 1.
- swipe:
    direction: LEFT
    duration: 400
- waitForAnimationToEnd

# The water widget header text is t('dashboard.water') = "Water"
- assertVisible: "Water"

# The water count display and buttons must be visible before interacting
- assertVisible:
    id: "water-count"
- assertVisible:
    id: "water-add-btn"

# ── Add a cup of water ─────────────────────────────────────────────────
- tapOn:
    id: "water-add-btn"
- waitForAnimationToEnd

# Add a second cup
- tapOn:
    id: "water-add-btn"
- waitForAnimationToEnd

# ── Assert water widget still visible and no crash ────────────────────
- assertVisible: "Water"
- assertVisible:
    id: "water-count"

# ── Remove one cup to restore state ───────────────────────────────────
- tapOn:
    id: "water-remove-btn"
- waitForAnimationToEnd

# Confirm water section is still visible after undo
- assertVisible: "Water"
- assertVisible:
    id: "water-count"
