---
# Flow 03: View dashboard and verify key UI elements
# Opens the app to the Home tab and asserts the calorie card, macro cards,
# water widget, and the bottom navigation bar are all rendered.
#
# Prerequisites: user is authenticated and has completed onboarding.
# The dashboard may show zeros if no meals have been logged yet — that is fine;
# we only verify structural elements, not data values.

appId: com.coach.mobile

---
- launchApp

# Wait for main tab bar to finish loading (auth + profile check resolves)
- extendedWaitUntil:
    visible: "Home"
    timeout: 12000

# Tap "Home" to make sure we are on the Home tab
- tapOn: "Home"
- waitForAnimationToEnd

# ── Bottom tab bar ─────────────────────────────────────────────────────
# All four tab labels must be visible
- assertVisible: "Home"
- assertVisible: "Log"
- assertVisible: "Progress"
- assertVisible: "Settings"

# ── Dashboard calorie card ─────────────────────────────────────────────
# The calorie card Pressable has testID="calorie-card"
- assertVisible:
    id: "calorie-card"

# ── Macro cards ────────────────────────────────────────────────────────
# Each MacroCard Pressable has a stable testID
- assertVisible:
    id: "macro-protein"
- assertVisible:
    id: "macro-carbs"
- assertVisible:
    id: "macro-fat"

# ── Water widget (page 1 of carousel) ─────────────────────────────────
# Swipe left on the nutrition carousel to reach page 1 which contains
# the Water summary card. The card has a label "WATER" (dashboard.water).
- swipe:
    direction: LEFT
    duration: 400
- waitForAnimationToEnd
- assertVisible: "Water"

# The water +/- buttons and count display have stable testIDs
- assertVisible:
    id: "water-count"
- assertVisible:
    id: "water-add-btn"
- assertVisible:
    id: "water-remove-btn"

# Swipe back to page 0 (calorie page)
- swipe:
    direction: RIGHT
    duration: 400
- waitForAnimationToEnd

# ── Meals section header ───────────────────────────────────────────────
# Whether meals exist or not, the section header renders below the carousel.
# testID="recently-added-header" is set on the Text element.
- scrollUntilVisible:
    element:
      id: "recently-added-header"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "recently-added-header"
