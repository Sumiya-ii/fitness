---
# Flow 08: Log a meal via voice (STT → worker pipeline)
# TODO: This is a scaffold. Voice flows are hard to automate with Maestro because
#       they require microphone input. Use a pre-recorded audio file injection
#       or mock the STT layer in a dev build.
#
# Taps the microphone icon in the Log tab, speaks / injects audio,
# waits for the voice draft to be processed by the worker,
# confirms the parsed items, and verifies the meal log appears.
#
# Prerequisites:
#   - User authenticated and onboarded.
#   - Microphone permission granted.
#   - Worker running and connected to Redis/DB.

appId: com.coach.mobile

---
- launchApp

- extendedWaitUntil:
    notVisible: "Hang tight..."
    timeout: 10000

# Navigate to the Log tab
- tapOn:
